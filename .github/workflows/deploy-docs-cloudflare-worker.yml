name: Deploy Fumadocs to Cloudflare Workers

on:
  push:
    branches:
      - master
    paths:
      - "apps/fumadocs/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-docs-cloudflare-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-cloudflare-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure wrangler & opennextjs are available
        working-directory: apps/fumadocs
        run: |
          if ! pnpm list wrangler --depth=0 > /dev/null 2>&1; then
            pnpm add -D wrangler @opennextjs/cloudflare
          fi

      - name: Create open-next.config.ts if missing
        working-directory: apps/fumadocs
        run: |
          if [ ! -f open-next.config.ts ]; then
            cat > open-next.config.ts << 'EOF'
          import { defineCloudflareConfig } from "@opennextjs/cloudflare";
          export default defineCloudflareConfig({
            middleware: { external: true },
          });
          EOF
          fi

      - name: Build
        working-directory: apps/fumadocs
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy
        working-directory: apps/fumadocs
        run: pnpm exec wrangler deploy